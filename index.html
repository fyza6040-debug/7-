<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة كب كيك</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
text-align:center;
overflow:hidden;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

.topbar{
position:fixed;
top:0;
width:100%;
background:#d2b48c;
padding:10px;
font-weight:bold;
z-index:10;
}

#controlBtn{
position:fixed;
top:10px;
left:10px;
z-index:999;
padding:10px;
background:white;
border:1px solid #333;
}

canvas{
border:2px solid #333;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div class="topbar">🎮 لعبة كب كيك</div>

<button id="controlBtn" onclick="startGame()">▶️ تشغيل اللعبة</button>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>دخول اللاعب</h2>
<input id="name" placeholder="اسمك"/>
<button onclick="join()">دخول</button>
</div>

<!-- WAIT -->
<div id="wait" class="page">
<h2>⏳ انتظر الكنترول</h2>
</div>

<!-- GAME -->
<div id="game" class="page">
<h2>✏️ ارسم الآن</h2>

<canvas id="canvas" width="300" height="300"></canvas>

<br/>
<button onclick="clearCanvas()">مسح</button>
<button onclick="send()">إرسال</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

//////////////////////////////////////////////////////
// 🔥 IMPORTANT: حطي بيانات Firebase الحقيقية هنا
//////////////////////////////////////////////////////
const firebaseConfig = {
apiKey: "PUT_YOUR_API_KEY",
authDomain: "cupcake-games-42925.firebaseapp.com",
projectId: "cupcake-games-42925",
storageBucket: "cupcake-games-42925.appspot.com",
messagingSenderId: "PUT_SENDER_ID",
appId: "PUT_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// تغيير الصفحات
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// دخول اللاعب
window.join = async function(){
let name = document.getElementById("name").value;
if(!name) return alert("اكتب اسمك");

try{
await addDoc(collection(db,"players"),{
name,
time:Date.now()
});
show("wait");
}catch(e){
alert("Firebase خطأ: " + e.message);
}
}

// مراقبة اللعبة
onSnapshot(doc(db,"game","room"),(snap)=>{
let d = snap.data();
if(d && d.state === "start"){
show("game");
}
});

// تشغيل اللعبة
window.startGame = async function(){
try{
await setDoc(doc(db,"game","room"),{
state:"start",
time:Date.now()
});
alert("بدأت اللعبة 🎮");
}catch(e){
alert("Firebase Error: " + e.message);
}
}

// الرسم
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing = false;

ctx.lineWidth = 3;
ctx.lineCap = "round";
ctx.strokeStyle = "black";

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mouseleave",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{
if(!drawing) return;

const rect = canvas.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
});

// touch
canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);

canvas.addEventListener("touchmove",(e)=>{
if(!drawing) return;

const rect = canvas.getBoundingClientRect();
const t = e.touches[0];

const x = t.clientX - rect.left;
const y = t.clientY - rect.top;

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
});

window.clearCanvas = function(){
ctx.clearRect(0,0,300,300);
}

window.send = async function(){
try{
await addDoc(collection(db,"drawings"),{
img:canvas.toDataURL(),
time:Date.now()
});
alert("تم الإرسال 🚀");
}catch(e){
alert("Firebase Error: " + e.message);
}
}

</script>

</body>
</html>
