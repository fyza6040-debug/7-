<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>وصف الصور الغامضة</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  background: #e9f6f6;
}

#intro, #gameBox{
  display:none;
}

img{
  width:260px;
  border-radius:15px;
  margin:10px;
}

button{
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
}

.avatar{
  width:60px;
  border-radius:50%;
  cursor:pointer;
  margin:5px;
  border:2px solid transparent;
}

.avatar:hover{
  border:2px solid #333;
}

#profile{
  margin:10px;
}
</style>
</head>

<body>

<!-- 👤 تسجيل اللاعب -->
<div id="start">
  <h1>مرحباً بك في وصف الصور الغامضة</h1>

  <input id="playerName" placeholder="اكتب اسمك">

  <p>اختاري أفاتار (اختياري):</p>

  <img class="avatar" onclick="selectAvatar(this)" src="https://i.imgur.com/1X5Q9Zb.png">
  <img class="avatar" onclick="selectAvatar(this)" src="https://i.imgur.com/8QZ2v8l.jpg">
  <img class="avatar" onclick="selectAvatar(this)" src="https://i.imgur.com/3g7nmJC.jpg">

  <br><br>

  <button onclick="goIntro()">التالي</button>
</div>

<!-- 📖 الشرح -->
<div id="intro">
  <h2>📖 شرح اللعبة</h2>

  <p>
    ستظهر لك صور غامضة وفلسفية.<br><br>
    اكتب وصفك للصورة بأفضل أسلوب ممكن.<br><br>
    كلما كان وصفك أجمل وأدق، تزيد فرصك في التميز.<br><br>
    استعد للإبداع ✨
  </p>

  <button onclick="startGame()">ابدأ اللعب</button>
</div>

<!-- 🎮 اللعبة -->
<div id="gameBox">

  <div id="profile">
    <img id="myAvatar" width="60" style="border-radius:50%">
    <p id="myName"></p>
  </div>

  <h3 id="welcome"></h3>

  <img id="img" src="https://i.imgur.com/9pXj4vK.jpg">

  <p>اكتب وصف الصورة:</p>

  <textarea rows="5" cols="30"></textarea>

  <br><br>

  <button onclick="nextImg()">التالي</button>

</div>

<script>

let selectedAvatar = "";
let i = 0;

let images = [
  "https://i.imgur.com/9pXj4vK.jpg",
  "https://i.imgur.com/3g7nmJC.jpg",
  "https://i.imgur.com/8QZ2v8l.jpg",
  "https://i.imgur.com/1Q9Zx1a.jpg",
  "https://i.imgur.com/7kL9m2B.jpg"
];

// اختيار أفاتار
function selectAvatar(img){
  selectedAvatar = img.src;
}

// الانتقال للشرح
function goIntro(){
  let name = document.getElementById("playerName").value;

  if(name == ""){
    alert("اكتبي اسمك");
    return;
  }

  document.getElementById("start").style.display="none";
  document.getElementById("intro").style.display="block";

  document.getElementById("myName").innerText = name;
}

// بدء اللعبة
function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("gameBox").style.display="block";

  let name = document.getElementById("playerName").value;

  document.getElementById("welcome").innerText = "أهلاً " + name;

  document.getElementById("myAvatar").src =
    selectedAvatar || "https://i.imgur.com/8QZ2v8l.jpg";
}

// تغيير الصور
function nextImg(){

  i++;
  if(i >= images.length){
    i = 0;
  }

  document.getElementById("img").src = images[i];
}

</script>

</body>
</html>
