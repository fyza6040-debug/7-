<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لعبة كب كيك</title>

<style>

body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.page{
display:none;
flex-direction:column;
align-items:center;
}

.active{
display:flex;
}

input{
padding:10px;
width:220px;
margin:10px;
font-size:18px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="login" class="page active">

<h1>🎮 لعبة كب كيك</h1>

<input id="playerName" placeholder="اكتب اسمك">

<button onclick="login()">
دخول
</button>

</div>

<div id="wait" class="page">

<h2>
⏳ انتظر الكنترول يبدأ اللعبة
</h2>

</div>

<script>

function login(){

let name=document.getElementById("playerName").value;

if(name==""){

alert("اكتب اسمك");

return;

}

document.getElementById("login").classList.remove("active");

document.getElementById("wait").classList.add("active");

}

</script>

</body>
</html>
