<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>كب كيك VIP🤭</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#74ebd5,#acb6e5);
  text-align:center;
  direction:rtl;
  color:white;
}

.box{
  margin-top:120px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  width:200px;
  margin:5px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ff4f91;
  color:white;
  cursor:pointer;
}

h1{
  font-size:40px;
}
</style>
</head>

<body>

<div id="content"></div>

<script>
// 🔐 التحقق من حالة اللعبة
let status = localStorage.getItem("gameStatus");

// إذا اللعبة مقفولة
if(status !== "open"){
  document.getElementById("content").innerHTML = `
    <h1>🔒 اللعبة مقفولة حالياً</h1>
    <p>انتظري فتح الكنترول</p>
  `;
}else{
  document.getElementById("content").innerHTML = `
    <div class="box">
      <h1>كب كيك VIP🤭</h1>
      <p>ادخلي اسمك</p>

      <input id="name" placeholder="اسمك">

      <br>

      <button onclick="join()">دخول</button>
    </div>
  `;
}

function join(){
  let name = document.getElementById("name").value;

  if(name === ""){
    alert("اكتبي اسمك");
    return;
  }

  localStorage.setItem("playerName", name);

  document.body.innerHTML = `
    <h1>مرحباً ${name} 👋</h1>
    <p>تم الدخول بنجاح 🎮</p>
  `;
}
</script>

</body>
</html>
