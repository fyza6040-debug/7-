<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة الكنترول - كب كيك</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
overflow:hidden;
}

.page{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

#canvas{
border:2px solid #333;
background:white;
touch-action:none;
}

.topbar{
position:fixed;
top:0;
width:100%;
background:#d2b48c;
padding:10px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">🎮 لعبة كب كيك - الكنترول</div>

<!-- صفحة الدخول -->
<div id="loginPage" class="page active">
<h2>دخول اللاعب</h2>
<input id="name" placeholder="اكتب اسمك"/>
<button onclick="joinGame()">دخول</button>
</div>

<!-- صفحة الانتظار -->
<div id="waitPage" class="page">
<h2>انتظار الكنترول يبدأ الجولة...</h2>
</div>

<!-- صفحة اللعب -->
<div id="gamePage" class="page">
<h3 id="taskText">المهمة</h3>
<canvas id="canvas" width="300" height="300"></canvas>
<br/>
<button onclick="clearCanvas()">مسح</button>
<button onclick="sendDraw()">إرسال</button>
</div>

<script>
let role = "player";
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing = false;

function show(page){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(page).classList.add("active");
}

// دخول اللاعب
function joinGame(){
let name = document.getElementById("name").value;
if(!name) return alert("اكتب اسمك");

show("waitPage");

// مؤقت تجريبي
setTimeout(()=>{
show("gamePage");
},2000);
}

// رسم
canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",stop);
canvas.addEventListener("touchmove",draw);

function start(e){drawing=true;}
function stop(){drawing=false; ctx.beginPath();}

function draw(e){
if(!drawing) return;

let x = e.touches ? e.touches[0].clientX : e.clientX;
let y = e.touches ? e.touches[0].clientY : e.clientY;

ctx.lineWidth=3;
ctx.lineCap="round";
ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function sendDraw(){
alert("تم الإرسال (لاحقًا بيرتبط بـ Firebase)");
}
</script>

</body>
</html>
