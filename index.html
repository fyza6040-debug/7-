<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>وصف الصور الغامضة</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#dff3f3;
}

#admin,#player,#intro,#game{
  display:none;
}

img{
  width:250px;
  border-radius:15px;
}

button{
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
}

.avatar{
  width:60px;
  border-radius:50%;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<div id="admin">
  <h1>🧠 لوحة الكنترول</h1>
  <button onclick="createGame()">إنشاء لعبة</button>
  <p id="link"></p>
</div>

<div id="player">

  <h2>🎮 وصف الصور الغامضة</h2>

  <input id="name" placeholder="اكتب اسمك">

  <p>اختار أفاتار (اختياري):</p>

  <img class="avatar" onclick="setAvatar(this)" src="https://i.imgur.com/1X5Q9Zb.png">
  <img class="avatar" onclick="setAvatar(this)" src="https://i.imgur.com/3g7nmJC.jpg">

  <br><br>

  <button onclick="goIntro()">التالي</button>
</div>

<div id="intro">
  <h2 id="hi"></h2>

  <p>✨ اكتب وصفك للصور الغامضة بأفضل أسلوب إبداعي</p>

  <button onclick="startGame()">ابدأ</button>
</div>

<div id="game">

  <h3 id="welcome"></h3>

  <img id="img" src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

  <p>اكتب وصف الصورة:</p>
  <textarea></textarea>

  <br><br>

  <button onclick="next()">التالي</button>
</div>

<script>

let avatar="";
let i=0;
let name="";

let images=[
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
  "https://images.unsplash.com/photo-1520975916090-3105956dac38",
  "https://images.unsplash.com/photo-1518837695005-2083093ee35b",
  "https://images.unsplash.com/photo-1470770903676-69b98201ea1c"
];

window.onload=function(){
  let url=new URLSearchParams(window.location.search);

  if(url.get("play")=="1"){
    document.getElementById("player").style.display="block";
  }else{
    document.getElementById("admin").style.display="block";
  }
}

function createGame(){
  let link=window.location.href.split("?")[0]+"?play=1";
  document.getElementById("link").innerText=link;
}

function setAvatar(img){
  avatar=img.src;
}

function goIntro(){
  name=document.getElementById("name").value;

  if(name==""){
    alert("اكتب اسمك");
    return;
  }

  document.getElementById("player").style.display="none";
  document.getElementById("intro").style.display="block";

  document.getElementById("hi").innerText="أهلاً " + name;
}

function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("welcome").innerText=name;
}

function next(){
  i++;
  if(i>=images.length) i=0;
  document.getElementById("img").src=images[i];
}

</script>

</body>
</html>
