<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة كب كيك</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

#canvas{
border:2px solid #333;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div id="login" class="page active">
<h2>دخول اللعبة</h2>
<input id="name" placeholder="اسمك"/>
<button onclick="join()">دخول</button>
</div>

<div id="wait" class="page">
<h2>انتظر بدء اللعبة</h2>
</div>

<div id="game" class="page">
<h3>ارسم الآن</h3>
<canvas id="canvas" width="300" height="300"></canvas>
<br/>
<button onclick="clearCanvas()">مسح</button>
<button onclick="send()">إرسال</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "PUT_API_KEY",
authDomain: "cupcake-games-42925.firebaseapp.com",
projectId: "cupcake-games-42925",
storageBucket: "cupcake-games-42925.appspot.com",
messagingSenderId: "PUT_ID",
appId: "PUT_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

window.join = async function(){
let name = document.getElementById("name").value;
if(!name) return alert("اكتب اسمك");

await addDoc(collection(db,"players"),{
name:name,
time:Date.now()
});

show("wait");

onSnapshot(collection(db,"game"),(snap)=>{
snap.forEach(doc=>{
if(doc.data().state==="start"){
show("game");
}
});
});
}

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let draw=false;

canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;

canvas.onmousemove=(e)=>{
if(!draw) return;
ctx.lineWidth=3;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
};

window.clearCanvas=()=>{
ctx.clearRect(0,0,300,300);
}

window.send=async function(){
await addDoc(collection(db,"drawings"),{
img:canvas.toDataURL(),
time:Date.now()
});
alert("تم الإرسال 🚀");
}

</script>

</body>
</html>
