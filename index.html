<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لعبة كب كيك</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
text-align:center;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{display:flex;}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

#canvas{
border:2px solid #333;
background:white;
touch-action:none;
}

.topbar{
position:fixed;
top:0;
width:100%;
background:#d2b48c;
padding:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">🎮 لعبة كب كيك</div>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>دخول اللاعب</h2>
<input id="name" placeholder="اسمك"/>
<button onclick="join()">دخول</button>
</div>

<!-- WAIT -->
<div id="wait" class="page">
<h2>⏳ انتظر الكنترول يبدأ اللعبة</h2>
</div>

<!-- GAME -->
<div id="game" class="page">
<h2>✏️ ارسم الآن</h2>
<canvas id="canvas" width="300" height="300"></canvas>
<br/>
<button onclick="clearCanvas()">مسح</button>
<button onclick="send()">إرسال</button>
</div>

<!-- CONTROL -->
<div id="control" class="page">
<h2>👑 الكنترول</h2>
<button onclick="startGame()">▶️ تشغيل اللعبة</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase (لا تغيّرين شيء هنا الآن)
const firebaseConfig = {
apiKey: "PUT_API_KEY",
authDomain: "cupcake-games-42925.firebaseapp.com",
projectId: "cupcake-games-42925",
storageBucket: "cupcake-games-42925.appspot.com",
messagingSenderId: "PUT_ID",
appId: "PUT_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== UI =====
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== دخول اللاعب =====
window.join = async function(){
let name = document.getElementById("name").value;
if(!name) return alert("اكتب اسمك");

await addDoc(collection(db,"players"),{
name:name,
time:Date.now()
});

show("wait");
}

// ===== مراقبة حالة اللعبة =====
onSnapshot(doc(db,"game","room"),(snap)=>{
let d = snap.data();
if(!d) return;

if(d.state === "start"){
show("game");
}
});

// ===== الكنترول =====
window.startGame = async function(){
try{
await setDoc(doc(db,"game","room"),{
state:"start",
time:Date.now()
});
alert("تم تشغيل اللعبة 🎮");
}catch(e){
alert("خطأ: " + e.message);
}
}

// ===== الرسم =====
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let draw=false;

canvas.onmousedown=()=>draw=true;
canvas.onmouseup=()=>draw=false;

canvas.onmousemove=(e)=>{
if(!draw) return;
ctx.lineWidth=3;
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
};

window.clearCanvas=function(){
ctx.clearRect(0,0,300,300);
}

window.send=async function(){
await addDoc(collection(db,"drawings"),{
img:canvas.toDataURL(),
time:Date.now()
});
alert("تم الإرسال 🚀");
}

</script>

</body>
</html>
