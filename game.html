<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة الكنترول</title>

<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5e6d3;
}

/* إخفاء */
.hidden{display:none}

/* تمركز */
.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* كرت */
.card{
background:#d2b48c;
padding:15px;
border-radius:15px;
width:90%;
max-width:450px;
text-align:center;
margin:10px auto;
}

/* مدخلات */
input,button{
padding:10px;
margin:5px;
width:90%;
border-radius:10px;
border:none;
font-size:14px;
}

button{cursor:pointer}

/* كنترول */
.adminTop{
background:#8b6b4f;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

/* اللعبة */
#playersArea{
background:#c8a97e;
min-height:100vh;
padding:10px;
}

/* رسم */
canvas{
background:white;
border-radius:10px;
touch-action:none;
width:100%;
height:300px;
}

/* أدوات */
.tools{
display:flex;
justify-content:space-around;
margin-top:5px;
}

.color{
width:25px;
height:25px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 كنترول دخول -->
<div id="login" class="center">
<div class="card">
<h3>🔐 دخول الكنترول</h3>
<input id="pass" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
</div>
</div>

<!-- 👑 الكنترول -->
<div id="admin" class="hidden">

<div class="adminTop">
👑 لوحة الكنترول
</div>

<div class="card">
<h3>⚙️ الإعدادات</h3>

<input id="ctrlName" placeholder="تغيير اسم الكنترول">
<input id="ctrlPass" placeholder="تغيير كلمة السر">

<button onclick="saveSettings()">حفظ</button>
<button onclick="copyPlayerLink()">🔗 نسخ رابط اللاعبين</button>

<button onclick="showPlayers()">👥 عرض اللاعبين</button>
<button onclick="resetGame()">🔄 إعادة</button>
</div>

<div id="playersList"></div>
</div>

<!-- 👥 اللاعبين -->
<div id="playersArea" class="hidden">

<div class="card">
<h3>🎮 دخول اللاعب</h3>

<input id="pName" placeholder="اسمك">
<input id="pImg" placeholder="صورة (اختياري)">
<button onclick="join()">دخول</button>
</div>

<div id="gameBox" class="hidden card">

<h3>🎯 اللعبة</h3>
<p>ارسم أو اكتب حسب الدور</p>

<div class="tools">
<div onclick="setColor('black')" class="color" style="background:black"></div>
<div onclick="setColor('red')" class="color" style="background:red"></div>
<div onclick="setColor('blue')" class="color" style="background:blue"></div>
<div onclick="setColor('green')" class="color" style="background:green"></div>
</div>

<canvas id="board"></canvas>

<button onclick="clearCanvas()">مسح</button>
<button onclick="saveDraw()">حفظ</button>

</div>

</div>

<script>

let password="1234";
let players=[];
let currentColor="black";
let drawing=false;
let ctx;

/* 🚀 تشغيل تلقائي (أهم شيء) */
window.onload=function(){
if(window.location.hash==="#player"){
document.getElementById("login").classList.add("hidden");
document.getElementById("playersArea").classList.remove("hidden");
}else{
document.getElementById("login").classList.remove("hidden");
}
}

/* 🔐 دخول الكنترول */
function login(){
let p=document.getElementById("pass").value;
if(p!==password){
alert("كلمة السر خطأ");
return;
}

document.getElementById("login").classList.add("hidden");
document.getElementById("admin").classList.remove("hidden");
}

/* ⚙️ حفظ إعدادات */
function saveSettings(){
let newPass=document.getElementById("ctrlPass").value;
if(newPass) password=newPass;
alert("تم الحفظ");
}

/* 🔗 رابط اللاعبين */
function copyPlayerLink(){
let link=window.location.href.split('#')[0] + "#player";
navigator.clipboard.writeText(link);
alert("تم نسخ رابط اللاعبين");
}

/* 👥 دخول لاعب */
function join(){
let name=document.getElementById("pName").value;
if(!name){
alert("اكتب اسمك");
return;
}

players.push({name:name,data:null});

document.getElementById("gameBox").classList.remove("hidden");

initCanvas();
}

/* 🎨 إعداد الرسم */
function initCanvas(){
let canvas=document.getElementById("board");
ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=300;

canvas.onmousedown=start;
canvas.onmouseup=stop;
canvas.onmousemove=draw;

canvas.ontouchstart=start;
canvas.ontouchend=stop;
canvas.ontouchmove=draw;
}

function start(e){drawing=true;ctx.beginPath();}
function stop(){drawing=false;}

function draw(e){
if(!drawing) return;

ctx.strokeStyle=currentColor;
ctx.lineWidth=3;
ctx.lineCap="round";

let x=e.offsetX || e.touches?.[0].clientX;
let y=e.offsetY || e.touches?.[0].clientY;

ctx.lineTo(x,y);
ctx.stroke();
}

function setColor(c){currentColor=c;}

function clearCanvas(){
ctx.clearRect(0,0,300,300);
}

function saveDraw(){
if(players.length>0){
players[players.length-1].data="🎨 رسم";
alert("تم الحفظ");
}
}

/* 🔄 عرض اللاعبين */
function showPlayers(){
let box=document.getElementById("playersList");
box.innerHTML="";

players.forEach(p=>{
box.innerHTML+=`<div class="card">${p.name}</div>`;
});
}

/* 🔄 إعادة */
function resetGame(){
players=[];
location.reload();
}

</script>

</body>
</html>
